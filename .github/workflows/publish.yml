name: Publish Release

on:
  release:
    types: [ published ]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Setup Java 25
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 25
      - name: Build plugin
        run: ./gradlew build release -Pversion="${{ github.event.release.tag_name }}"
      - name: Upload to Release
        uses: softprops/action-gh-release@v3
        continue-on-error: true
        with:
          files: |
            out/*.jar
            email/build/libs/*.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload to Modrinth
        uses: cloudnode-pro/modrinth-publish@v2
        continue-on-error: true
        with:
          token: ${{ secrets.MODRINTH_TOKEN }}
          project: ${{ vars.MODRINTH_ID }}
          name: ${{ github.event.repository.name }} ${{ github.event.release.tag_name }}
          version: ${{ github.event.release.tag_name }}
          loaders: |-
            folia
            purpur
            paper
            spigot
            bukkit
          game-versions: 1.8 - 26.1
          # CraftEngine, PlaceholderAPI
          dependencies: |-
            [
              {"project_id": "tRX6FMfQ", "dependency_type": "optional"},
              {"project_id": "lKEzGugV", "dependency_type": "optional"}
            ]
          files: out/${{ github.event.repository.name }}-${{ github.event.release.tag_name }}-plugin.jar
      - name: Trigger Jitpack
        continue-on-error: true
        run: |
          curl -L https://jitpack.io/com/github/${{ github.repository }}/${{ github.event.release.tag_name }}/build.log
